<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Circular terracotta background -->
  <circle cx="32" cy="32" r="32" fill="#F7F4EF"/>

  <!-- Top-left bracket ⌐ -->
  <polyline
    points="15,23 15,15 23,15"
    fill="none"
    stroke="#C94C28"
    stroke-width="3.2"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />

  <!-- Bottom-right bracket ¬ -->
  <polyline
    points="49,41 49,49 41,49"
    fill="none"
    stroke="#C94C28"
    stroke-width="3.2"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />

  <!-- Serif R, centered -->
  <text
    x="32"
    y="45"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="28"
    font-weight="700"
    fill="#C94C28"
    text-anchor="middle"
  >R</text>
</svg>
